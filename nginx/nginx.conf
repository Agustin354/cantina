upstream ventas {
    server ventas:5000;
}

upstream produccion {
    server produccion:5001;
}

server {
    listen 80;
    server_name localhost;

    client_max_body_size 10M;

    # Cabeceras de seguridad globales
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Reportes estáticos ─────────────────────────────────────────────────
    location /reports/ {
        alias /app/reports/;
        autoindex off;
        add_header Cache-Control "no-cache";
    }

    # ── API Ventas (prefijo explícito /api/ventas/ → /api/) ───────────────
    location /api/ventas/ {
        proxy_pass         http://ventas/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_pass_header  Set-Cookie;
    }

    # ── API Producción (prefijo explícito /api/produccion/ → /api/) ───────
    location /api/produccion/ {
        proxy_pass         http://produccion/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_pass_header  Set-Cookie;
    }

    # ── /produccion (sin trailing slash) → redirige para normalizar ───────
    location = /produccion {
        return 301 /produccion/;
    }

    # ── /produccion/ → produccion service con strip de prefijo ───────────
    # /produccion/foo  → produccion:5001/foo
    # /produccion/     → produccion:5001/
    location /produccion/ {
        proxy_pass         http://produccion/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_pass_header  Set-Cookie;
    }

    # ── /ventas y demás rutas de ventas ────────────────────────────────────
    location /ventas {
        proxy_pass         http://ventas;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_pass_header  Set-Cookie;
    }

    # ── Raíz → Ventas (login unificado) ────────────────────────────────────
    location / {
        proxy_pass         http://ventas;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_pass_header  Set-Cookie;
    }
}
