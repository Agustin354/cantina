version: "3.9"

networks:
  tia_perla_net:
    driver: bridge

volumes:
  reports_data:

services:

  # ─── Servicio de Ventas ──────────────────────────────────────────────────────
  ventas:
    build:
      context: ./ventas_service
      dockerfile: Dockerfile
    container_name: tia_perla_ventas
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./ventas_service/.env
    volumes:
      - reports_data:/reports
    networks:
      - tia_perla_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ─── Servicio de Producción ──────────────────────────────────────────────────
  produccion:
    build:
      context: ./produccion_service
      dockerfile: Dockerfile
    container_name: tia_perla_produccion
    restart: unless-stopped
    ports:
      - "5001:5001"
    env_file:
      - ./produccion_service/.env
    volumes:
      - reports_data:/reports
    networks:
      - tia_perla_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ─── NGINX Gateway ───────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: tia_perla_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - reports_data:/app/reports:ro
    networks:
      - tia_perla_net
    depends_on:
      - ventas
      - produccion
