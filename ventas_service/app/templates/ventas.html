<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ventas — Cantina</title>
  <style>
    /* ── Variables de tema ──────────────────────────────── */
    :root {
      --bg:           #f0f2f5;
      --surface:      #ffffff;
      --surface-2:    #f0f2f5;
      --text:         #1a1a2e;
      --text-sec:     #333333;
      --text-muted:   #666666;
      --text-subtle:  #999999;
      --border:       #f0f2f5;
      --border-input: #e0e0e0;
      --shadow-sm:    rgba(0,0,0,0.07);
      --shadow-md:    rgba(0,0,0,0.10);
      --accent:       #0f3460;
      --accent-light: #0f3460;
    }
    [data-theme="dark"] {
      --bg:           #0d1117;
      --surface:      #161b22;
      --surface-2:    #1c2128;
      --text:         #e6edf3;
      --text-sec:     #cdd5df;
      --text-muted:   #8b949e;
      --text-subtle:  #6e7681;
      --border:       #21262d;
      --border-input: #30363d;
      --shadow-sm:    rgba(0,0,0,0.25);
      --shadow-md:    rgba(0,0,0,0.40);
      --accent:       #58a6ff;
      --accent-light: #388bfd;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background 0.25s, color 0.25s;
    }

    /* ── Header ─────────────────────────────────────────── */
    header {
      background: linear-gradient(90deg, #1a1a2e, #0f3460);
      color: #fff;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 3px 12px rgba(0,0,0,0.3);
      position: sticky;
      top: 0;
      z-index: 100;
      gap: 12px;
    }
    header h1 { font-size: 1.3rem; font-weight: 800; }
    header .user-info { font-size: 0.9rem; color: #a0b4cc; }
    .header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .btn-logout {
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: background 0.2s;
      text-decoration: none;
    }
    .btn-logout:hover { background: rgba(255,255,255,0.25); }
    .btn-tema {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      width: 38px; height: 38px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .btn-tema:hover { background: rgba(255,255,255,0.25); }

    /* ── Tabs ────────────────────────────────────────────── */
    .tabs {
      display: flex;
      background: var(--surface);
      border-bottom: 3px solid var(--border);
      padding: 0 24px;
      transition: background 0.25s, border-color 0.25s;
    }
    .tab-btn {
      padding: 16px 28px;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      background: none;
      cursor: pointer;
      color: var(--text-muted);
      border-bottom: 3px solid transparent;
      margin-bottom: -3px;
      transition: color 0.2s, border-color 0.2s;
    }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-btn:hover:not(.active) { color: var(--text-sec); }

    .tab-content { display: none; flex: 1; padding: 24px; }
    .tab-content.active { display: flex; flex-direction: column; }

    /* ── Balance Indicator ───────────────────────────────── */
    #balance-bar {
      background: var(--surface);
      border-radius: 12px;
      padding: 14px 20px;
      margin-bottom: 20px;
      display: flex;
      gap: 24px;
      align-items: center;
      flex-wrap: wrap;
      box-shadow: 0 2px 8px var(--shadow-sm);
      transition: background 0.25s;
    }
    #balance-bar .bal-item { font-size: 0.9rem; }
    #balance-bar .bal-item span { font-weight: 700; font-size: 1rem; }
    #saldo-fichas { color: #27ae60; }
    #saldo-gs     { color: var(--accent); }

    /* ── Emisión de Fichas ───────────────────────────────── */
    .emision-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .emision-row {
      background: var(--surface);
      border-radius: 12px;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 2px 8px var(--shadow-sm);
      transition: background 0.25s;
    }
    .denom-badge {
      background: #0f3460;
      color: #fff;
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: 800;
      font-size: 0.95rem;
      white-space: nowrap;
      min-width: 110px;
      text-align: center;
    }
    [data-theme="dark"] .denom-badge { background: #1d3557; }
    .emision-row input[type=number] {
      width: 80px;
      padding: 10px 12px;
      border: 2px solid var(--border-input);
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 700;
      text-align: center;
      outline: none;
      background: var(--surface);
      color: var(--text);
      transition: border-color 0.2s, background 0.25s, color 0.25s;
    }
    .emision-row input[type=number]:focus { border-color: var(--accent); }
    .emision-subtotal {
      margin-left: auto;
      font-size: 0.85rem;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .emision-subtotal strong { color: #27ae60; font-size: 1rem; }

    #total-emision {
      background: var(--surface);
      border-radius: 12px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      box-shadow: 0 2px 8px var(--shadow-sm);
      margin-bottom: 16px;
      transition: background 0.25s;
    }
    #total-emision .total-text { font-size: 1.1rem; color: var(--text-sec); }
    #total-emision .total-num  { font-size: 1.5rem; font-weight: 900; color: #27ae60; }
    #total-fichas-emision      { color: var(--accent) !important; }

    .btn-confirmar {
      background: #27ae60;
      color: #fff;
      border: none;
      padding: 18px 36px;
      border-radius: 12px;
      font-size: 1.15rem;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: background 0.2s, transform 0.1s;
      width: 100%;
    }
    .btn-confirmar:hover:not(:disabled) { background: #219a52; }
    .btn-confirmar:active:not(:disabled) { transform: scale(0.98); }
    .btn-confirmar:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ── Productos + Carrito ────────────────────────────── */
    .ventas-layout { display: flex; gap: 20px; flex: 1; min-height: 0; }
    .productos-panel { flex: 1; overflow-y: auto; }
    .productos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
    }
    .producto-card {
      background: var(--surface);
      border-radius: 12px;
      padding: 16px 12px;
      text-align: center;
      cursor: pointer;
      box-shadow: 0 2px 8px var(--shadow-sm);
      transition: transform 0.15s, box-shadow 0.15s, background 0.25s;
      border: 2px solid transparent;
      user-select: none;
    }
    .producto-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px var(--shadow-md);
      border-color: #27ae60;
    }
    .producto-card:active { transform: scale(0.97); }
    .producto-card.sin-stock { opacity: 0.45; pointer-events: none; }
    .prod-nombre { font-size: 0.9rem; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .prod-precio { font-size: 1.2rem; font-weight: 900; color: #27ae60; }
    .prod-fichas { font-size: 0.72rem; color: var(--text-subtle); }
    .prod-stock  { font-size: 0.75rem; color: var(--text-subtle); margin-top: 4px; }

    /* ── Carrito ─────────────────────────────────────────── */
    .carrito-panel {
      width: 320px;
      min-width: 280px;
      background: var(--surface);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 16px var(--shadow-md);
      display: flex;
      flex-direction: column;
      transition: background 0.25s;
    }
    .carrito-panel h3 {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--border);
    }
    #lista-carrito { flex: 1; overflow-y: auto; min-height: 120px; max-height: 340px; }
    .carrito-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .ci-nombre  { flex: 1; font-size: 0.85rem; font-weight: 600; color: var(--text-sec); }
    .ci-qty-btn {
      width: 28px; height: 28px;
      border: none; border-radius: 6px;
      background: var(--surface-2); cursor: pointer;
      font-size: 1rem; font-weight: 700; color: var(--text);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .ci-qty-btn:hover { background: var(--border-input); }
    .ci-qty { font-size: 0.95rem; font-weight: 700; min-width: 24px; text-align: center; color: var(--text); }
    .ci-sub { font-size: 0.85rem; font-weight: 700; color: var(--accent); min-width: 60px; text-align: right; }
    .ci-del { background: none; border: none; color: #c0392b; cursor: pointer; font-size: 1.1rem; padding: 2px 4px; }
    #carrito-vacio { text-align: center; color: var(--text-subtle); padding: 32px 0; font-size: 0.95rem; }
    .carrito-total { margin-top: 14px; padding-top: 14px; border-top: 2px solid var(--border); }
    .ct-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 0.9rem;
      color: var(--text-muted);
    }
    .ct-row strong { color: var(--text); }
    .ct-total {
      display: flex;
      justify-content: space-between;
      margin: 10px 0;
      font-size: 1.2rem;
      font-weight: 900;
      color: var(--text);
    }
    .ct-total .total-gs { color: #27ae60; }
    .btn-pagar {
      width: 100%;
      padding: 16px;
      background: #e74c3c;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 800;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 10px;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-pagar:hover:not(:disabled) { background: #c0392b; }
    .btn-pagar:active:not(:disabled) { transform: scale(0.98); }
    .btn-pagar:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ── Toast ───────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 30px; left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #1a1a2e;
      color: #fff;
      padding: 16px 32px;
      border-radius: 12px;
      font-size: 1rem; font-weight: 600;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      z-index: 999;
      transition: transform 0.35s cubic-bezier(.4,0,.2,1);
      max-width: 90vw; text-align: center;
    }
    #toast.show    { transform: translateX(-50%) translateY(0); }
    #toast.success { background: #27ae60; }
    #toast.error   { background: #e74c3c; }

    @media (max-width: 900px) {
      .ventas-layout { flex-direction: column; }
      .carrito-panel { width: 100%; min-width: unset; }
    }
  </style>
  <script>
    (function(){
      const t = localStorage.getItem('tema') || 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>

  <header>
    <h1>🏪 Cantina — Ventas</h1>
    <span class="user-info">👤 {{ usuario }}</span>
    <div class="header-right">
      <button class="btn-tema" id="btn-tema" onclick="toggleTema()" title="Cambiar tema"></button>
      <a href="/logout" class="btn-logout">Cerrar Sesión</a>
    </div>
  </header>

  <div class="tabs">
    <button class="tab-btn active" onclick="cambiarTab('emision', this)">🪙 Emitir Fichas</button>
    <button class="tab-btn"       onclick="cambiarTab('venta',   this)">🛒 Vender Productos</button>
  </div>

  <!-- ══ TAB EMISIÓN ════════════════════════════════════════════════ -->
  <div id="tab-emision" class="tab-content active">

    <div id="balance-bar">
      <div class="bal-item">💰 Saldo fichas: <span id="saldo-fichas">—</span></div>
      <div class="bal-item">💵 En Guaraníes: <span id="saldo-gs">—</span></div>
      <div class="bal-item" id="bal-emitidas">📤 Emitidas: <span>—</span></div>
      <div class="bal-item" id="bal-usadas">📥 Usadas: <span>—</span></div>
    </div>

    <div class="emision-grid" id="emision-grid"></div>

    <div id="total-emision">
      <div>
        <div class="total-text">Total a ingresar en caja</div>
        <div class="total-num" id="total-gs-emision">Gs. 0</div>
      </div>
      <div>
        <div class="total-text">Fichas a entregar</div>
        <div class="total-num" id="total-fichas-emision">0 fichas</div>
      </div>
    </div>

    <button class="btn-confirmar" id="btn-confirmar-emision" onclick="confirmarEmision()">
      ✅ CONFIRMAR EMISIÓN
    </button>

  </div>

  <!-- ══ TAB VENTAS ═════════════════════════════════════════════════ -->
  <div id="tab-venta" class="tab-content">
    <div class="ventas-layout">

      <div class="productos-panel">
        <div class="productos-grid" id="productos-grid"></div>
      </div>

      <div class="carrito-panel">
        <h3>🛒 Carrito</h3>
        <div id="lista-carrito">
          <div id="carrito-vacio">El carrito está vacío</div>
        </div>
        <div class="carrito-total">
          <div class="ct-row"><span>Total fichas:</span> <strong id="ct-fichas">0</strong></div>
          <div class="ct-total">
            <span>TOTAL</span>
            <span class="total-gs" id="ct-guaranies">Gs. 0</span>
          </div>
          <button class="btn-pagar" id="btn-pagar" onclick="procesarPago()">💳 PAGAR</button>
        </div>
      </div>

    </div>
  </div>

  <div id="toast"></div>

  <script>
  // ═══ TEMA ══════════════════════════════════════════════════════════════════
  document.getElementById('btn-tema').textContent =
    document.documentElement.getAttribute('data-theme') === 'dark' ? '☀️' : '🌙';

  function toggleTema() {
    const html  = document.documentElement;
    const nuevo = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', nuevo);
    localStorage.setItem('tema', nuevo);
    document.getElementById('btn-tema').textContent = nuevo === 'dark' ? '☀️' : '🌙';
  }

  // ═══ UTILIDADES ═══════════════════════════════════════════════════════════
  function fmt(n) { return 'Gs. ' + Number(n).toLocaleString('es-PY'); }

  let toastTimer;
  function toast(msg, tipo = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show ' + tipo;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.className = ''; }, 3500);
  }

  // ═══ TABS ══════════════════════════════════════════════════════════════════
  function cambiarTab(nombre, btn) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + nombre).classList.add('active');
    btn.classList.add('active');
    if (nombre === 'venta' && productos.length === 0) cargarProductos();
    if (nombre === 'emision') cargarBalance();
  }

  // ═══ BALANCE ═══════════════════════════════════════════════════════════════
  async function cargarBalance() {
    try {
      const res = await fetch('/api/balance');
      if (!res.ok) return;
      const d = await res.json();
      document.getElementById('saldo-fichas').textContent = d.saldo_fichas + ' fichas';
      document.getElementById('saldo-gs').textContent     = fmt(d.saldo_guaranies);
      document.getElementById('bal-emitidas').querySelector('span').textContent = d.fichas_emitidas;
      document.getElementById('bal-usadas').querySelector('span').textContent   = d.fichas_usadas;
    } catch(e) {}
  }

  // ═══ DENOMINACIONES + EMISIÓN ═════════════════════════════════════════════
  const DENOMINACIONES = [1000, 5000, 10000, 15000, 20000];

  function buildEmisionGrid() {
    const grid = document.getElementById('emision-grid');
    grid.innerHTML = '';
    DENOMINACIONES.forEach(d => {
      const row = document.createElement('div');
      row.className = 'emision-row';
      row.innerHTML = `
        <div class="denom-badge">💵 ${d.toLocaleString('es-PY')} Gs.</div>
        <input type="number" min="0" max="999" value="0"
               id="qty-${d}" onchange="recalcularEmision()"
               oninput="recalcularEmision()" placeholder="0"/>
        <div class="emision-subtotal">
          <div>subtotal:</div>
          <strong id="sub-${d}">Gs. 0</strong>
        </div>`;
      grid.appendChild(row);
    });
  }

  function recalcularEmision() {
    let totalGs = 0, totalFichas = 0;
    DENOMINACIONES.forEach(d => {
      const qty = parseInt(document.getElementById('qty-' + d).value) || 0;
      const sub = d * qty;
      document.getElementById('sub-' + d).textContent = 'Gs. ' + sub.toLocaleString('es-PY');
      totalGs     += sub;
      totalFichas += sub / 1000;
    });
    document.getElementById('total-gs-emision').textContent     = fmt(totalGs);
    document.getElementById('total-fichas-emision').textContent = totalFichas + ' fichas';
  }

  async function confirmarEmision() {
    const btn = document.getElementById('btn-confirmar-emision');
    const emisiones = DENOMINACIONES
      .map(d => ({ denominacion: d, cantidad: parseInt(document.getElementById('qty-' + d).value) || 0 }))
      .filter(e => e.cantidad > 0);

    if (emisiones.length === 0) { toast('Ingrese al menos una cantidad', 'error'); return; }

    btn.disabled = true;
    btn.textContent = '⏳ Procesando...';
    try {
      const res = await fetch('/api/emitir', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({emisiones})
      });
      const data = await res.json();
      if (data.ok) {
        toast(`✓ ¡Emisión exitosa! ${data.total_fichas} fichas — ${fmt(data.total_guaranies)}`, 'success');
        DENOMINACIONES.forEach(d => {
          document.getElementById('qty-' + d).value = 0;
          document.getElementById('sub-' + d).textContent = 'Gs. 0';
        });
        recalcularEmision();
        cargarBalance();
      } else {
        toast(data.error || 'Error al emitir fichas', 'error');
      }
    } catch(e) {
      toast('No hay conexión con el servidor', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = '✅ CONFIRMAR EMISIÓN';
    }
  }

  // ═══ PRODUCTOS ════════════════════════════════════════════════════════════
  let productos = [];

  async function cargarProductos() {
    try {
      const res = await fetch('/api/productos');
      if (!res.ok) throw new Error();
      productos = await res.json();
      renderProductos();
    } catch(e) {
      document.getElementById('productos-grid').innerHTML =
        '<p style="color:#e74c3c;padding:20px">No se pudieron cargar los productos</p>';
    }
  }

  function renderProductos() {
    const grid = document.getElementById('productos-grid');
    grid.innerHTML = '';
    productos.forEach(p => {
      const div = document.createElement('div');
      div.className = 'producto-card' + (p.stock <= 0 ? ' sin-stock' : '');
      div.onclick = () => agregarAlCarrito(p);
      div.innerHTML = `
        <div class="prod-nombre">${p.nombre}</div>
        <div class="prod-precio">${p.precio}</div>
        <div class="prod-fichas">fichas</div>
        <div class="prod-stock">${p.stock > 0 ? 'Stock: ' + p.stock : '⚠️ Sin stock'}</div>`;
      grid.appendChild(div);
    });
  }

  // ═══ CARRITO ══════════════════════════════════════════════════════════════
  let carrito = {};

  function agregarAlCarrito(p) {
    if (p.stock <= 0) return;
    if (carrito[p._id]) {
      if (carrito[p._id].cantidad >= p.stock) { toast(`Solo hay ${p.stock} en stock`, 'error'); return; }
      carrito[p._id].cantidad++;
    } else {
      carrito[p._id] = { producto_id: p._id, nombre: p.nombre, precio_fichas: p.precio, cantidad: 1, stock: p.stock };
    }
    renderCarrito();
  }

  function cambiarCantidad(id, delta) {
    if (!carrito[id]) return;
    carrito[id].cantidad += delta;
    if (carrito[id].cantidad <= 0) delete carrito[id];
    renderCarrito();
  }

  function quitarItem(id) { delete carrito[id]; renderCarrito(); }

  function renderCarrito() {
    const lista = document.getElementById('lista-carrito');
    const items = Object.values(carrito);
    document.getElementById('carrito-vacio').style.display = items.length === 0 ? '' : 'none';
    lista.querySelectorAll('.carrito-item').forEach(el => el.remove());
    let totalFichas = 0;
    items.forEach(it => {
      const sub = it.precio_fichas * it.cantidad;
      totalFichas += sub;
      const div = document.createElement('div');
      div.className = 'carrito-item';
      div.innerHTML = `
        <div class="ci-nombre">${it.nombre}</div>
        <button class="ci-qty-btn" onclick="cambiarCantidad('${it.producto_id}', -1)">−</button>
        <div class="ci-qty">${it.cantidad}</div>
        <button class="ci-qty-btn" onclick="cambiarCantidad('${it.producto_id}', 1)">+</button>
        <div class="ci-sub">${sub} fic.</div>
        <button class="ci-del" onclick="quitarItem('${it.producto_id}')">🗑</button>`;
      lista.appendChild(div);
    });
    document.getElementById('ct-fichas').textContent    = totalFichas + ' fichas';
    document.getElementById('ct-guaranies').textContent = fmt(totalFichas * 1000);
    document.getElementById('btn-pagar').disabled = items.length === 0;
  }

  async function procesarPago() {
    const btn = document.getElementById('btn-pagar');
    const items = Object.values(carrito);
    if (items.length === 0) { toast('El carrito está vacío', 'error'); return; }
    btn.disabled = true;
    btn.textContent = '⏳ Procesando...';
    try {
      const res = await fetch('/api/venta', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ items: items.map(it => ({
          producto_id: it.producto_id, nombre: it.nombre,
          cantidad: it.cantidad, precio_fichas: it.precio_fichas
        }))})
      });
      const data = await res.json();
      if (data.ok) {
        toast(`✓ ¡Venta registrada! ${data.total_fichas} fichas — ${fmt(data.total_guaranies)}`, 'success');
        carrito = {};
        renderCarrito();
        cargarProductos();
      } else {
        toast(data.error || 'Error al procesar la venta', 'error');
      }
    } catch(e) {
      toast('No hay conexión con el servidor', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = '💳 PAGAR';
    }
  }

  // ═══ INIT ══════════════════════════════════════════════════════════════════
  buildEmisionGrid();
  recalcularEmision();
  cargarBalance();
  </script>
</body>
</html>
